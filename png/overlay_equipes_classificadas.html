<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1" />
  <title>Overlay Equipes Classificadas - PNG</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../theme.css">
  <script src="../overlay_config.js"></script>

  <style>
    :root{
      --stage-w: 1920px;
      --stage-h: 1080px;

      --table-x: 50%;
      --table-y: 140px;
      --table-w: 1650px;
      --table-h: 860px;
      --table-shift-x: -50%;

      --title-x: 50%;
      --title-y: 25px;
      --title-w: 1600px;
      --title-h: 90px;

      --title-font: "Anton","Impact","Arial Black",sans-serif;
      --title-size: 70px;
      --title-weight: 700;
      --title-color: #4a4a4a;
      --title-align: center;

      --items-per-row: 6;
      --item-box-w: 210px;
      --item-box-h: 130px;
      --gap-x: 28px;
      --gap-y: 18px;
      --section-gap: 42px;

      --top-art-x: 0px;
      --top-art-y: 0px;
      --top-art-w: 1920px;
      --top-art-h: 1080px;
      --top-art-fit: contain;
      --top-art-opacity: 1;
    }

    *{ box-sizing:border-box; }

    html,body{
      width:var(--stage-w);
      height:var(--stage-h);
      margin:0;
      overflow:hidden;
      background:transparent;
    }

    body{
      font-family:"Oswald","Segoe UI",Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      text-rendering:optimizeLegibility;
    }

    .stage{
      position:relative;
      width:var(--stage-w);
      height:var(--stage-h);
      overflow:hidden;
      background:transparent;
    }

    .top-art{
      position:absolute;
      left:var(--top-art-x);
      top:var(--top-art-y);
      width:var(--top-art-w);
      height:var(--top-art-h);
      object-fit:var(--top-art-fit);
      opacity:var(--top-art-opacity);
      display:none;
      pointer-events:none;
      z-index:1;
    }

    .title{
      position:absolute;
      left:var(--title-x);
      top:var(--title-y);
      width:var(--title-w);
      height:var(--title-h);
      transform:translateX(-50%);
      display:flex;
      align-items:center;
      justify-content:center;
      text-transform:uppercase;
      color:var(--title-color);
      font-family:var(--title-font);
      font-size:var(--title-size);
      font-weight:var(--title-weight);
      text-align:var(--title-align);
      letter-spacing:.03em;
      line-height:1;
      z-index:3;
      pointer-events:none;
      white-space:nowrap;
      overflow:hidden;
    }

    .wrap{
      position:absolute;
      left:var(--table-x);
      top:var(--table-y);
      width:var(--table-w);
      height:var(--table-h);
      transform:translateX(var(--table-shift-x));
      z-index:2;
      pointer-events:none;
      overflow:hidden;
    }

    .sections{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      gap:var(--section-gap);
      align-items:center;
      justify-content:flex-start;
    }

    .section{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }

    .section-title{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      text-transform:uppercase;
      line-height:1;
      letter-spacing:.02em;
      white-space:nowrap;
      overflow:hidden;
    }

    .section-title.is-highlight{
      transform:scale(1.02);
    }

    .logos-grid{
      display:grid;
      grid-template-columns:repeat(var(--items-per-row), var(--item-box-w));
      grid-auto-rows:var(--item-box-h);
      justify-content:center;
      align-content:start;
      column-gap:var(--gap-x);
      row-gap:var(--gap-y);
    }

    .logo-item{
      position:relative;
      width:var(--item-box-w);
      height:var(--item-box-h);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      isolation:isolate;
    }

    .logo-bg{
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      background:var(--logo-bg, transparent);
      border-radius:var(--logo-radius, 0px);
      border:var(--logo-border-size, 0px) solid var(--logo-border-color, transparent);
      opacity:var(--logo-border-opacity, 1);
    }

    .logo-inner{
      position:relative;
      z-index:1;
      width:100%;
      height:100%;
      padding:var(--logo-padding, 0px);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .logo-inner img{
      width:100%;
      height:100%;
      object-fit:var(--logo-fit, contain);
      object-position:var(--logo-align-x, center) var(--logo-align-y, center);
      opacity:var(--logo-opacity, 1);
      display:block;
    }

    .debug{
      position:absolute;
      left:20px;
      bottom:20px;
      max-width:860px;
      padding:10px 14px;
      background:rgba(0,0,0,.72);
      color:#fff;
      font:14px/1.4 monospace;
      border-radius:10px;
      z-index:99;
      display:none;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>
  <div class="stage">
    <img id="topArt" class="top-art" alt="Arte topo">
    <div class="title" id="title"></div>

    <div class="wrap" id="wrap">
      <div class="sections" id="sections"></div>
    </div>

    <div class="debug" id="debug"></div>
  </div>

  <script>
    const CFG = window.OVERLAY_CFG || {};
    const API_KEY = CFG.API_KEY || "";
    const SHEET_ID = CFG.SHEET_ID || "";
    const REFRESH_MS = Number(CFG.REFRESH_MS ?? 5000);

    // CORRIGIDO
    const CONFIG_RANGE = "CONFIG!A350:H473";

    const titleEl = document.getElementById("title");
    const topArt = document.getElementById("topArt");
    const sectionsEl = document.getElementById("sections");
    const debugEl = document.getElementById("debug");

    let refreshTimer = null;

    function safeText(v){
      return String(v ?? "").trim();
    }

    function normalizeHeader(v){
      return safeText(v)
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, "_")
        .replace(/[^\w]/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_+|_+$/g, "")
        .toUpperCase();
    }

    function normalizeKey(v){
      return safeText(v)
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, "_")
        .replace(/[^\w]/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_+|_+$/g, "")
        .toLowerCase();
    }

    function toBool(v, fallback = false){
      const s = safeText(v).toLowerCase();
      if (["1","true","sim","yes"].includes(s)) return true;
      if (["0","false","nao","não","no"].includes(s)) return false;
      return fallback;
    }

    function toNumber(v, fallback = 0){
      const s = safeText(v).replace(",", ".");
      const n = Number(s);
      return Number.isFinite(n) ? n : fallback;
    }

    function isNumericLike(v){
      const s = safeText(v).replace(",", ".");
      return s !== "" && !isNaN(Number(s));
    }

    function parseMeasure(value, fallback = "", percentWhenFraction = false){
      const s = safeText(value);
      if (!s) return fallback;
      if (/[a-z%]/i.test(s) && !/^-?\d+(?:[.,]\d+)?$/.test(s)) return s;

      const n = toNumber(s, NaN);
      if (!Number.isFinite(n)) return fallback;

      if (percentWhenFraction && n >= 0 && n <= 1) {
        return `${n * 100}%`;
      }
      return `${n}px`;
    }

    function resolveFont(v){
      const s = safeText(v).toLowerCase();
      if (!s) return '"Oswald","Segoe UI",Arial,sans-serif';
      if (s === "cutmark") return '"Oswald","Segoe UI",Arial,sans-serif';
      if (s === "anton") return '"Anton","Impact","Arial Black",sans-serif';
      if (s === "oswald") return '"Oswald","Segoe UI",Arial,sans-serif';
      return `"${safeText(v)}","Oswald","Segoe UI",Arial,sans-serif`;
    }

    function toSrc(path){
      let p = safeText(path);
      if (!p) return "";
      if (/^https?:\/\//i.test(p)) return p;

      p = p.replace(/\\/g, "/");

      const parts = p.split("/").filter(Boolean);
      const lower = parts.map(x => x.toLowerCase());

      const folderIndex =
        lower.indexOf("assets") >= 0 ? lower.indexOf("assets") :
        lower.indexOf("logos") >= 0 ? lower.indexOf("logos") :
        lower.indexOf("maps") >= 0 ? lower.indexOf("maps") :
        lower.indexOf("players") >= 0 ? lower.indexOf("players") :
        lower.indexOf("jogadores") >= 0 ? lower.indexOf("jogadores") :
        -1;

      if (folderIndex >= 0) {
        p = parts.slice(folderIndex).join("/");
      }

      // Como o arquivo fica dentro da pasta /png
      if (!/^https?:\/\//i.test(p) && !p.startsWith("../")) {
        p = "../" + p;
      }

      return encodeURI(p);
    }

    async function fetchSheetRange(range){
      const url =
        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/` +
        encodeURIComponent(range) +
        `?key=${API_KEY}&majorDimension=ROWS`;

      const res = await fetch(url, { cache:"no-store" });
      if (!res.ok) throw new Error(`Erro ao carregar ${range}: HTTP ${res.status}`);
      return res.json();
    }

    async function fetchSheetRanges(ranges){
      if (!ranges.length) return {};
      const params = ranges.map(r => `ranges=${encodeURIComponent(r)}`).join("&");
      const url =
        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values:batchGet?` +
        `${params}&key=${API_KEY}&majorDimension=ROWS`;

      const res = await fetch(url, { cache:"no-store" });
      if (!res.ok) throw new Error(`Erro ao carregar ranges em lote: HTTP ${res.status}`);
      const json = await res.json();

      const out = {};
      for (const vr of (json.valueRanges || [])) {
        out[vr.range.replace(/'/g, "")] = vr.values || [];
      }
      return out;
    }

    function parseConfigMatrix(values){
      const rows = values || [];
      if (!rows.length) throw new Error("CONFIG vazia.");

      const headerRow = rows[0] || [];
      const normHeaders = headerRow.map(normalizeHeader);

      const obsIndex = normHeaders.indexOf("OBS");
      const pngIndex = normHeaders.indexOf("PNG");

      if (pngIndex < 0) throw new Error("Coluna PNG não encontrada na CONFIG.");

      const firstDataIndex = 2;
      const lastDataIndexExclusive = obsIndex >= 0 ? obsIndex : pngIndex;

      const dataColumns = [];
      for (let i = firstDataIndex; i < lastDataIndexExclusive; i++) {
        const original = safeText(headerRow[i]);
        const key = normalizeHeader(original);
        if (!original || !key) continue;
        dataColumns.push({
          index: i,
          header: original,
          key,
          cfg: {}
        });
      }

      const globalPng = {};

      for (let r = 1; r < rows.length; r++) {
        const row = rows[r] || [];
        const cfgKey = normalizeKey(row[1]);
        if (!cfgKey) continue;

        for (const col of dataColumns) {
          const val = row[col.index];
          if (val !== undefined && safeText(val) !== "") {
            col.cfg[cfgKey] = safeText(val);
          }
        }

        const pngVal = row[pngIndex];
        if (pngVal !== undefined && safeText(pngVal) !== "") {
          globalPng[cfgKey] = safeText(pngVal);
        }
      }

      return { dataColumns, globalPng, meta:{ obsIndex, pngIndex } };
    }

    function buildVisibleColumns(parsed){
      return parsed.dataColumns
        .map(col => {
          const cfg = col.cfg || {};
          return {
            key: col.key,
            header: col.header,
            type: normalizeKey(cfg.type || "image"),
            show: toBool(cfg.show, false),
            range: safeText(cfg.range),

            text_color: cfg.text_color || "#ffffff",
            font: resolveFont(cfg.font),
            font_size: parseMeasure(cfg.font_size, "24px"),
            font_weight: cfg.font_weight || "500",
            align: (cfg.align || "center").toLowerCase(),

            widthRaw: safeText(cfg.width || "210"),
            heightRaw: safeText(cfg.height || "130"),
            use_custom_height: toBool(cfg.use_custom_height, true),
            padding: parseMeasure(cfg.padding, "0px"),
            item_gap: parseMeasure(cfg.item_gap, "0px"),
            gap_after: safeText(cfg.gap_after || ""),
            background: cfg.background || "transparent",
            radius: parseMeasure(cfg.radius, "0px"),

            image_fit: cfg.image_fit || "contain",
            image_align_x: cfg.image_align_x || "center",
            image_align_y: cfg.image_align_y || "center",
            image_opacity: cfg.image_opacity || "1",

            border: parseMeasure(cfg.border, "0px"),
            border_color: cfg.border_color || "#ffffff",
            border_opacity: cfg.border_opacity || "1"
          };
        })
        .filter(col => col.show);
    }

    function findColumn(columns, aliases){
      const normalizedAliases = aliases.map(normalizeHeader);
      return columns.find(col => normalizedAliases.includes(normalizeHeader(col.header)));
    }

    function normalizeTableX(v){
      const s = safeText(v);
      if (!s) return { left:"50%", shift:"-50%" };

      if (isNumericLike(s)) {
        const n = toNumber(s, 0);
        if (n >= 0 && n <= 1) return { left:`${n * 100}%`, shift:"-50%" };
        return { left:`${n}px`, shift:"0px" };
      }

      if (s.includes("%")) return { left:s, shift:"-50%" };
      return { left:s, shift:"0px" };
    }

    function normalizeAxisValue(v, allowPercentFromFraction = false, fallback = "0px"){
      return parseMeasure(v, fallback, allowPercentFromFraction);
    }

    function applyGlobalPng(globalPng){
      const tablePos = normalizeTableX(globalPng.table_x || "0,5");
      document.documentElement.style.setProperty("--table-x", tablePos.left);
      document.documentElement.style.setProperty("--table-shift-x", tablePos.shift);
      document.documentElement.style.setProperty("--table-y", normalizeAxisValue(globalPng.table_y, false, "140px"));
      document.documentElement.style.setProperty("--table-w", normalizeAxisValue(globalPng.table_w, false, "1650px"));
      document.documentElement.style.setProperty("--table-h", normalizeAxisValue(globalPng.table_h, false, "860px"));

      const titlePos = normalizeTableX(globalPng.title_x || "0,5");
      document.documentElement.style.setProperty("--title-x", titlePos.left);
      document.documentElement.style.setProperty("--title-y", normalizeAxisValue(globalPng.title_y, false, "25px"));
      document.documentElement.style.setProperty("--title-w", normalizeAxisValue(globalPng.title_w, false, "1600px"));
      document.documentElement.style.setProperty("--title-h", normalizeAxisValue(globalPng.title_h, false, "90px"));
      document.documentElement.style.setProperty("--title-font", resolveFont(globalPng.title_font));
      document.documentElement.style.setProperty("--title-size", normalizeAxisValue(globalPng.title_size, false, "70px"));
      document.documentElement.style.setProperty("--title-weight", globalPng.title_weight || "700");
      document.documentElement.style.setProperty("--title-color", globalPng.title_color || "#4a4a4a");

      titleEl.textContent = safeText(globalPng.title_text || "EQUIPES CLASSIFICADAS");
      titleEl.style.display = toBool(globalPng.show_title, true) ? "flex" : "none";
      titleEl.style.justifyContent =
        safeText(globalPng.title_align || "center").toLowerCase() === "left" ? "flex-start" :
        safeText(globalPng.title_align || "center").toLowerCase() === "right" ? "flex-end" : "center";
      titleEl.style.textAlign = safeText(globalPng.title_align || "center").toLowerCase();

      document.documentElement.style.setProperty("--items-per-row", String(Math.max(1, toNumber(globalPng.items_per_row, 6))));
      document.documentElement.style.setProperty("--item-box-w", normalizeAxisValue(globalPng.item_box_w, false, "210px"));
      document.documentElement.style.setProperty("--item-box-h", normalizeAxisValue(globalPng.item_box_h, false, "130px"));
      document.documentElement.style.setProperty("--gap-x", normalizeAxisValue(globalPng.gap_x, false, "28px"));
      document.documentElement.style.setProperty("--gap-y", normalizeAxisValue(globalPng.gap_y, false, "18px"));
      document.documentElement.style.setProperty("--section-gap", normalizeAxisValue(globalPng.section_gap, false, "42px"));

      const topArtPath = safeText(globalPng.top_art_image);
      if (topArtPath && topArtPath !== "0") {
        topArt.src = toSrc(topArtPath);
        topArt.style.display = "block";
      } else {
        topArt.removeAttribute("src");
        topArt.style.display = "none";
      }

      document.documentElement.style.setProperty("--top-art-x", normalizeAxisValue(globalPng.top_art_x, true, "0px"));
      document.documentElement.style.setProperty("--top-art-y", normalizeAxisValue(globalPng.top_art_y, true, "0px"));
      document.documentElement.style.setProperty("--top-art-w", normalizeAxisValue(globalPng.top_art_w, false, "1920px"));
      document.documentElement.style.setProperty("--top-art-h", normalizeAxisValue(globalPng.top_art_h, false, "1080px"));
      document.documentElement.style.setProperty("--top-art-fit", globalPng.top_art_fit || "contain");
      document.documentElement.style.setProperty("--top-art-opacity", globalPng.top_art_opacity || "1");

      return {
        autoRefresh: toBool(globalPng.auto_refresh, true),
        totalTeams: Math.max(1, toNumber(globalPng.total_teams, 12)),
        categoryCount: Math.max(1, Math.min(3, toNumber(globalPng.category_count, 2))),
        itemsPerRow: Math.max(1, toNumber(globalPng.items_per_row, 6)),
        cat1: {
          show: toBool(globalPng.cat1_show, true),
          title: safeText(globalPng.cat1_title || "CLASSIFICADAS"),
          count: Math.max(0, toNumber(globalPng.cat1_count, 6)),
          highlight: toBool(globalPng.cat1_highlight, true),
          color: globalPng.cat1_title_color || "#4a4a4a",
          font: resolveFont(globalPng.cat1_title_font || "anton"),
          size: parseMeasure(globalPng.cat1_title_size, "42px"),
          weight: globalPng.cat1_title_weight || "700",
          height: parseMeasure(globalPng.cat1_title_h, "50px")
        },
        cat2: {
          show: toBool(globalPng.cat2_show, true),
          title: safeText(globalPng.cat2_title || "ELIMINADAS"),
          count: Math.max(0, toNumber(globalPng.cat2_count, 6)),
          highlight: toBool(globalPng.cat2_highlight, false),
          color: globalPng.cat2_title_color || "#6a6a6a",
          font: resolveFont(globalPng.cat2_title_font || "anton"),
          size: parseMeasure(globalPng.cat2_title_size, "34px"),
          weight: globalPng.cat2_title_weight || "700",
          height: parseMeasure(globalPng.cat2_title_h, "44px")
        },
        cat3: {
          show: toBool(globalPng.cat3_show, false),
          title: safeText(globalPng.cat3_title || "CATEGORIA 3"),
          count: Math.max(0, toNumber(globalPng.cat3_count, 0)),
          highlight: toBool(globalPng.cat3_highlight, false),
          color: globalPng.cat3_title_color || "#6a6a6a",
          font: resolveFont(globalPng.cat3_title_font || "anton"),
          size: parseMeasure(globalPng.cat3_title_size, "34px"),
          weight: globalPng.cat3_title_weight || "700",
          height: parseMeasure(globalPng.cat3_title_h, "44px")
        },
        styles: {
          qualified: {
            bg: globalPng.qualified_bg || "transparent",
            radius: parseMeasure(globalPng.qualified_radius, "0px"),
            border: parseMeasure(globalPng.qualified_border, "0px"),
            borderColor: globalPng.qualified_border_color || "#d4af37",
            borderOpacity: String(toNumber(globalPng.qualified_border_opacity, 1))
          },
          category2: {
            bg: globalPng.category2_bg || "transparent",
            radius: parseMeasure(globalPng.category2_radius, "0px"),
            border: parseMeasure(globalPng.category2_border, "0px"),
            borderColor: globalPng.category2_border_color || "#666666",
            borderOpacity: String(toNumber(globalPng.category2_border_opacity, 1))
          },
          category3: {
            bg: globalPng.category3_bg || "transparent",
            radius: parseMeasure(globalPng.category3_radius, "0px"),
            border: parseMeasure(globalPng.category3_border, "0px"),
            borderColor: globalPng.category3_border_color || "#666666",
            borderOpacity: String(toNumber(globalPng.category3_border_opacity, 1))
          }
        }
      };
    }

    function collectRanges(columns){
      const set = new Set();
      for (const col of columns) {
        if (safeText(col.range).toLowerCase() !== "auto" && safeText(col.range)) {
          set.add(col.range.replace(/'/g, ""));
        }
      }
      return [...set];
    }

    function getMaxRowsFromData(columns, dataByRange){
      let max = 0;
      for (const col of columns) {
        const range = safeText(col.range).replace(/'/g, "");
        if (!range || range.toLowerCase() === "auto") continue;
        const rows = dataByRange[range] || [];
        if (rows.length > max) max = rows.length;
      }
      return max || 12;
    }

    function readRangeValue(range, dataByRange, rowIndex){
      const key = safeText(range).replace(/'/g, "");
      const rows = dataByRange[key] || [];
      const row = rows[rowIndex] || [];
      return row.map(v => safeText(v)).filter(Boolean).join(" ").trim();
    }

    function buildItems(columns, dataByRange, totalRows){
      const out = [];
      for (let i = 0; i < totalRows; i++) {
        const item = {};
        for (const col of columns) {
          let value = "";
          if (safeText(col.range).toLowerCase() === "auto") {
            value = String(i + 1).padStart(2, "0");
          } else {
            value = readRangeValue(col.range, dataByRange, i);
          }
          item[col.key] = { value, config: col };
        }
        out.push(item);
      }
      return out;
    }

    function createLogoItem(item, logoRef, categoryStyle){
      const logo = item[logoRef.key] || { value:"", config: logoRef };

      const el = document.createElement("div");
      el.className = "logo-item";

      const bg = document.createElement("div");
      bg.className = "logo-bg";
      bg.style.setProperty("--logo-bg", categoryStyle.bg || logo.config.background || "transparent");
      bg.style.setProperty("--logo-radius", categoryStyle.radius || logo.config.radius || "0px");
      bg.style.setProperty("--logo-border-size", categoryStyle.border || logo.config.border || "0px");
      bg.style.setProperty("--logo-border-color", categoryStyle.borderColor || logo.config.border_color || "#ffffff");
      bg.style.setProperty("--logo-border-opacity", categoryStyle.borderOpacity || logo.config.border_opacity || "1");

      const inner = document.createElement("div");
      inner.className = "logo-inner";
      inner.style.setProperty("--logo-padding", logo.config.padding || "0px");

      const img = document.createElement("img");
      const src = toSrc(logo.value);
      img.alt = "Logo equipe";
      img.style.setProperty("--logo-fit", logo.config.image_fit);
      img.style.setProperty("--logo-align-x", logo.config.image_align_x);
      img.style.setProperty("--logo-align-y", logo.config.image_align_y);
      img.style.setProperty("--logo-opacity", logo.config.image_opacity);

      if (src) {
        img.src = src;
        img.onerror = () => { img.style.display = "none"; };
      } else {
        img.style.display = "none";
      }

      inner.appendChild(img);
      el.appendChild(bg);
      el.appendChild(inner);

      return el;
    }

    function createSection(sectionCfg, items, logoRef, styleCfg){
      const section = document.createElement("div");
      section.className = "section";

      const title = document.createElement("div");
      title.className = "section-title";
      if (sectionCfg.highlight) title.classList.add("is-highlight");
      title.textContent = sectionCfg.title;
      title.style.color = sectionCfg.color;
      title.style.fontFamily = sectionCfg.font;
      title.style.fontSize = sectionCfg.size;
      title.style.fontWeight = sectionCfg.weight;
      title.style.height = sectionCfg.height;

      const grid = document.createElement("div");
      grid.className = "logos-grid";

      for (const item of items) {
        grid.appendChild(createLogoItem(item, logoRef, styleCfg));
      }

      section.appendChild(title);
      section.appendChild(grid);
      return section;
    }

    function renderSections(allItems, logoRef, state){
      sectionsEl.innerHTML = "";

      const limitedItems = allItems.slice(0, state.totalTeams);

      const catDefs = [
        { cfg: state.cat1, style: state.styles.qualified },
        { cfg: state.cat2, style: state.styles.category2 },
        { cfg: state.cat3, style: state.styles.category3 }
      ];

      let cursor = 0;
      const maxCategories = Math.max(1, Math.min(3, state.categoryCount));

      for (let i = 0; i < maxCategories; i++) {
        const current = catDefs[i];
        if (!current.cfg.show) continue;

        const count = Math.max(0, current.cfg.count);
        const slice = limitedItems.slice(cursor, cursor + count);
        cursor += count;

        if (!slice.length) continue;

        sectionsEl.appendChild(createSection(current.cfg, slice, logoRef, current.style));
      }
    }

    function showDebug(text){
      debugEl.style.display = "block";
      debugEl.textContent = text;
    }

    function hideDebug(){
      debugEl.style.display = "none";
      debugEl.textContent = "";
    }

    async function tick(){
      try{
        if (!API_KEY || !SHEET_ID) {
          throw new Error("API_KEY ou SHEET_ID não definidos no overlay_config.js");
        }

        const cfgJson = await fetchSheetRange(CONFIG_RANGE);
        const parsed = parseConfigMatrix(cfgJson.values || []);
        const visibleColumns = buildVisibleColumns(parsed);

        if (!visibleColumns.length) {
          throw new Error("Nenhuma coluna visível encontrada na CONFIG (show = 1).");
        }

        const logoRef = findColumn(visibleColumns, ["LOGO","LOGOS"]);
        if (!logoRef) throw new Error("Coluna LOGO não encontrada na CONFIG.");

        const state = applyGlobalPng(parsed.globalPng);

        const ranges = collectRanges(visibleColumns);
        const dataByRange = await fetchSheetRanges(ranges);

        const totalRows = getMaxRowsFromData(visibleColumns, dataByRange);
        const items = buildItems(visibleColumns, dataByRange, totalRows);

        renderSections(items, logoRef, state);

        hideDebug();

        if (!state.autoRefresh && refreshTimer) {
          clearInterval(refreshTimer);
          refreshTimer = null;
        }
      } catch (err) {
        console.error(err);
        showDebug(
          "ERRO NA OVERLAY EQUIPES CLASSIFICADAS PNG:\n\n" +
          (err?.message || String(err))
        );
      }
    }

    tick();

    if (!refreshTimer) {
      refreshTimer = setInterval(tick, REFRESH_MS);
    }
  </script>
</body>
