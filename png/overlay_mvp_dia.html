<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1" />
  <title>Overlay MVP do Dia - PNG</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../theme.css">
  <script src="../overlay_config.js"></script>

  <style>
    :root{
      --stage-w: 1920px;
      --stage-h: 1080px;

      --table-x: 50%;
      --table-y: 30px;
      --table-w: 1100px;
      --table-h: 1000px;
      --table-shift-x: -50%;

      --title-x: 50%;
      --title-y: 0px;
      --title-w: 800px;
      --title-h: 100px;

      --title-font: "Anton","Impact","Arial Black",sans-serif;
      --title-size: 72px;
      --title-weight: 700;
      --title-color: #d0a652;
      --title-align: center;

      --card-h: 96px;
      --row-gap: 10px;
      --cell-gap: 8px;
      --col-gap: 0px;

      --row-bg-image: none;
      --row-bg-fit: cover;
      --row-bg-pos-x: center;
      --row-bg-pos-y: center;
      --row-bg-opacity: 1;

      --top-art-x: 0px;
      --top-art-y: 0px;
      --top-art-w: 0px;
      --top-art-h: 0px;
      --top-art-fit: contain;
      --top-art-opacity: 0;
    }

    *{ box-sizing:border-box; }

    html,body{
      width:var(--stage-w);
      height:var(--stage-h);
      margin:0;
      overflow:hidden;
      background:transparent;
    }

    body{
      font-family:"Oswald","Segoe UI",Arial,sans-serif;
    }

    .stage{
      position:relative;
      width:var(--stage-w);
      height:var(--stage-h);
      overflow:hidden;
      background:transparent;
    }

    .top-art{
      position:absolute;
      left:var(--top-art-x);
      top:var(--top-art-y);
      width:var(--top-art-w);
      height:var(--top-art-h);
      object-fit:var(--top-art-fit);
      opacity:var(--top-art-opacity);
      display:none;
      pointer-events:none;
      z-index:1;
    }

    .title{
      position:absolute;
      left:var(--title-x);
      top:var(--title-y);
      width:var(--title-w);
      height:var(--title-h);
      transform:translateX(-50%);
      display:flex;
      align-items:center;
      justify-content:center;
      text-transform:uppercase;
      color:var(--title-color);
      font-family:var(--title-font);
      font-size:var(--title-size);
      font-weight:var(--title-weight);
      text-align:var(--title-align);
      letter-spacing:.03em;
      line-height:1;
      z-index:3;
      pointer-events:none;
      white-space:nowrap;
      overflow:hidden;
    }

    .wrap{
      position:absolute;
      left:var(--table-x);
      top:var(--table-y);
      width:var(--table-w);
      height:var(--table-h);
      transform:translateX(var(--table-shift-x));
      z-index:2;
      pointer-events:none;
    }

    .board{
      position:absolute;
      inset:0;
      display:grid;
      grid-template-columns:1fr 1fr;
      column-gap:var(--col-gap);
      align-content:start;
    }

    .board.mode-single{
      grid-template-columns:1fr;
    }

    .col{
      display:flex;
      flex-direction:column;
      gap:var(--row-gap);
      min-width:0;
      align-content:start;
    }

    .card{
      position:relative;
      height:var(--card-h);
      display:grid;
      align-items:center;
      min-width:0;
      overflow:visible;
      isolation:isolate;
    }

    .card-bg{
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      background-image:var(--row-bg-image);
      background-repeat:no-repeat;
      background-size:var(--row-bg-fit);
      background-position:var(--row-bg-pos-x) var(--row-bg-pos-y);
      opacity:var(--row-bg-opacity);
    }

    .slot{
      min-width:0;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position:relative;
      z-index:1;
    }

    .slot-rank{
      color:var(--rank-color, #f2f2f2);
      font-family:var(--rank-font, "Oswald","Segoe UI",Arial,sans-serif);
      font-size:var(--rank-size, 34px);
      font-weight:var(--rank-weight, 700);
      text-transform:uppercase;
      letter-spacing:.02em;
      line-height:1;
    }

    .slot-logo img{
      width:100%;
      height:100%;
      display:block;
    }

    .slot-name{
      justify-content:flex-start;
    }

    .name-txt{
      width:100%;
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1;
      text-transform:uppercase;
    }

    .slot-kill{
      flex-direction:column;
      justify-content:center;
    }

    .kill-label{
      width:100%;
      text-align:center;
      text-transform:uppercase;
      line-height:1;
      margin-bottom:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .kill-value{
      width:100%;
      text-align:center;
      text-transform:uppercase;
      line-height:1;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .debug{
      position:absolute;
      left:20px;
      bottom:20px;
      max-width:860px;
      padding:10px 14px;
      background:rgba(0,0,0,.72);
      color:#fff;
      font:14px/1.4 monospace;
      border-radius:10px;
      z-index:99;
      display:none;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>
  <div class="stage">
    <img id="topArt" class="top-art" alt="Arte topo">
    <div class="title" id="title"></div>

    <div class="wrap" id="wrap">
      <div class="board" id="board">
        <div class="col" id="colLeft"></div>
        <div class="col" id="colRight"></div>
      </div>
    </div>

    <div class="debug" id="debug"></div>
  </div>

  <script>
    const CFG = window.OVERLAY_CFG || {};
    const API_KEY = CFG.API_KEY || "";
    const SHEET_ID = CFG.SHEET_ID || "";
    const REFRESH_MS = Number(CFG.REFRESH_MS ?? 5000);

    const CONFIG_RANGE = "CONFIG!A264:I340";

    const wrap = document.getElementById("wrap");
    const board = document.getElementById("board");
    const titleEl = document.getElementById("title");
    const topArt = document.getElementById("topArt");
    const colLeft = document.getElementById("colLeft");
    const colRight = document.getElementById("colRight");
    const debugEl = document.getElementById("debug");

    let refreshTimer = null;

    function safeText(v){
      return String(v ?? "").trim();
    }

    function normalizeHeader(v){
      return safeText(v)
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, "_")
        .replace(/[^\w]/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_+|_+$/g, "")
        .toUpperCase();
    }

    function normalizeKey(v){
      return safeText(v)
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, "_")
        .replace(/[^\w]/g, "_")
        .replace(/_+/g, "_")
        .replace(/^_+|_+$/g, "")
        .toLowerCase();
    }

    function toBool(v, fallback = false){
      const s = safeText(v).toLowerCase();
      if (["1","true","sim","yes"].includes(s)) return true;
      if (["0","false","nao","não","no"].includes(s)) return false;
      return fallback;
    }

    function toNumber(v, fallback = 0){
      const s = safeText(v).replace(",", ".");
      const n = Number(s);
      return Number.isFinite(n) ? n : fallback;
    }

    function isNumericLike(v){
      const s = safeText(v).replace(",", ".");
      return s !== "" && !isNaN(Number(s));
    }

    function parseMeasure(value, fallback = "", percentWhenFraction = false){
      const s = safeText(value);
      if (!s) return fallback;
      if (/[a-z%]/i.test(s) && !/^-?\d+(?:[.,]\d+)?$/.test(s)) return s;

      const n = toNumber(s, NaN);
      if (!Number.isFinite(n)) return fallback;

      if (percentWhenFraction && n >= 0 && n <= 1) {
        return `${n * 100}%`;
      }
      return `${n}px`;
    }

    function resolveFont(v){
      const s = safeText(v).toLowerCase();
      if (!s) return '"Oswald","Segoe UI",Arial,sans-serif';
      if (s === "cutmark") return '"Oswald","Segoe UI",Arial,sans-serif';
      if (s === "anton") return '"Anton","Impact","Arial Black",sans-serif';
      if (s === "oswald") return '"Oswald","Segoe UI",Arial,sans-serif';
      return `"${safeText(v)}","Oswald","Segoe UI",Arial,sans-serif`;
    }

    function toSrc(path){
      let p = safeText(path);
      if (!p) return "";
      if (/^https?:\/\//i.test(p)) return p;

      p = p.replace(/\\/g, "/");

      const parts = p.split("/").filter(Boolean);
      const lower = parts.map(x => x.toLowerCase());

      const folderIndex =
        lower.indexOf("assets") >= 0 ? lower.indexOf("assets") :
        lower.indexOf("logos") >= 0 ? lower.indexOf("logos") :
        lower.indexOf("maps") >= 0 ? lower.indexOf("maps") :
        lower.indexOf("players") >= 0 ? lower.indexOf("players") :
        lower.indexOf("jogadores") >= 0 ? lower.indexOf("jogadores") :
        -1;

      if (folderIndex >= 0) {
        p = parts.slice(folderIndex).join("/");
      }

      if (!/^https?:\/\//i.test(p) && !p.startsWith("../")) {
        p = "../" + p;
      }

      return encodeURI(p);
    }

    async function fetchSheetRange(range){
      const url =
        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/` +
        encodeURIComponent(range) +
        `?key=${API_KEY}&majorDimension=ROWS`;

      const res = await fetch(url, { cache:"no-store" });
      if (!res.ok) throw new Error(`Erro ao carregar ${range}: HTTP ${res.status}`);
      return res.json();
    }

    async function fetchSheetRanges(ranges){
      if (!ranges.length) return {};
      const params = ranges.map(r => `ranges=${encodeURIComponent(r)}`).join("&");
      const url =
        `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values:batchGet?` +
        `${params}&key=${API_KEY}&majorDimension=ROWS`;

      const res = await fetch(url, { cache:"no-store" });
      if (!res.ok) throw new Error(`Erro ao carregar ranges em lote: HTTP ${res.status}`);
      const json = await res.json();

      const out = {};
      for (const vr of (json.valueRanges || [])) {
        out[vr.range.replace(/'/g, "")] = vr.values || [];
      }
      return out;
    }

    function parseConfigMatrix(values){
      const rows = values || [];
      if (!rows.length) throw new Error("CONFIG vazia.");

      const headerRow = rows[0] || [];
      const normHeaders = headerRow.map(normalizeHeader);

      const obsIndex = normHeaders.indexOf("OBS");
      const pngIndex = normHeaders.indexOf("PNG");

      if (obsIndex < 0) throw new Error("Coluna OBS não encontrada na CONFIG.");
      if (pngIndex < 0) throw new Error("Coluna PNG não encontrada na CONFIG.");

      const firstDataIndex = 2;
      const lastDataIndexExclusive = obsIndex;

      const dataColumns = [];
      for (let i = firstDataIndex; i < lastDataIndexExclusive; i++) {
        const original = safeText(headerRow[i]);
        const key = normalizeHeader(original);
        if (!original || !key) continue;
        dataColumns.push({
          index: i,
          header: original,
          key,
          cfg: {}
        });
      }

      const globalObs = {};
      const globalPng = {};

      for (let r = 1; r < rows.length; r++) {
        const row = rows[r] || [];
        const cfgKey = normalizeKey(row[1]);
        if (!cfgKey) continue;

        for (const col of dataColumns) {
          const val = row[col.index];
          if (val !== undefined && safeText(val) !== "") {
            col.cfg[cfgKey] = safeText(val);
          }
        }

        const obsVal = row[obsIndex];
        if (obsVal !== undefined && safeText(obsVal) !== "") {
          globalObs[cfgKey] = safeText(obsVal);
        }

        const pngVal = row[pngIndex];
        if (pngVal !== undefined && safeText(pngVal) !== "") {
          globalPng[cfgKey] = safeText(pngVal);
        }
      }

      return { dataColumns, globalObs, globalPng, meta:{ obsIndex, pngIndex } };
    }

    function buildVisibleColumns(parsed){
      return parsed.dataColumns
        .map(col => {
          const cfg = col.cfg || {};
          return {
            key: col.key,
            header: col.header,
            type: normalizeKey(cfg.type || "text"),
            show: toBool(cfg.show, false),
            range: safeText(cfg.range),

            text_color: cfg.text_color || "#ffffff",
            font: resolveFont(cfg.font),
            font_size: parseMeasure(cfg.font_size, "24px"),
            font_weight: cfg.font_weight || "500",
            align: (cfg.align || "center").toLowerCase(),

            widthRaw: safeText(cfg.width || "auto"),
            heightRaw: safeText(cfg.height || ""),
            use_custom_height: toBool(cfg.use_custom_height, false),
            padding: parseMeasure(cfg.padding, "0px"),
            item_gap: parseMeasure(cfg.item_gap, "0px"),
            gap_after: safeText(cfg.gap_after || ""),
            background: cfg.background || "transparent",
            radius: parseMeasure(cfg.radius, "0px"),

            image_fit: cfg.image_fit || "contain",
            image_align_x: cfg.image_align_x || "center",
            image_align_y: cfg.image_align_y || "center",
            image_opacity: cfg.image_opacity || "1",

            header_text: safeText(cfg.header_text || col.header),
            header_show: toBool(cfg.header_show, false),
            header_color: cfg.header_color || "#606060",
            header_font: resolveFont(cfg.header_font || "cutmark"),
            header_size: parseMeasure(cfg.header_size, "18px"),
            header_weight: cfg.header_weight || "600",
            header_align: (cfg.header_align || cfg.align || "center").toLowerCase()
          };
        })
        .filter(col => col.show);
    }

    function findColumn(columns, aliases){
      const normalizedAliases = aliases.map(normalizeHeader);
      return columns.find(col => normalizedAliases.includes(normalizeHeader(col.header)));
    }

    function normalizeTableX(v){
      const s = safeText(v);
      if (!s) return { left:"50%", shift:"-50%" };

      if (isNumericLike(s)) {
        const n = toNumber(s, 0);
        if (n >= 0 && n <= 1) return { left:`${n * 100}%`, shift:"-50%" };
        return { left:`${n}px`, shift:"0px" };
      }

      if (s.includes("%")) return { left:s, shift:"-50%" };
      return { left:s, shift:"0px" };
    }

    function normalizeAxisValue(v, allowPercentFromFraction = false, fallback = "0px"){
      return parseMeasure(v, fallback, allowPercentFromFraction);
    }

    function applyGlobalPng(globalPng){
      const tablePos = normalizeTableX(globalPng.table_x || "0,5");
      document.documentElement.style.setProperty("--table-x", tablePos.left);
      document.documentElement.style.setProperty("--table-shift-x", tablePos.shift);
      document.documentElement.style.setProperty("--table-y", normalizeAxisValue(globalPng.table_y, false, "30px"));
      document.documentElement.style.setProperty("--table-w", normalizeAxisValue(globalPng.table_w, false, "1100px"));
      document.documentElement.style.setProperty("--table-h", normalizeAxisValue(globalPng.table_h, false, "1000px"));

      document.documentElement.style.setProperty("--card-h", normalizeAxisValue(globalPng.row_height, false, "96px"));
      document.documentElement.style.setProperty("--row-gap", normalizeAxisValue(globalPng.row_gap, false, "10px"));
      document.documentElement.style.setProperty("--cell-gap", normalizeAxisValue(globalPng.cell_gap, false, "8px"));
      document.documentElement.style.setProperty("--col-gap", normalizeAxisValue(globalPng.col_gap, false, "0px"));

      const titlePos = normalizeTableX(globalPng.title_x || "0,5");
      document.documentElement.style.setProperty("--title-x", titlePos.left);
      document.documentElement.style.setProperty("--title-y", normalizeAxisValue(globalPng.title_y, false, "0px"));
      document.documentElement.style.setProperty("--title-w", normalizeAxisValue(globalPng.title_w, false, "800px"));
      document.documentElement.style.setProperty("--title-h", normalizeAxisValue(globalPng.title_h, false, "100px"));
      document.documentElement.style.setProperty("--title-font", resolveFont(globalPng.title_font));
      document.documentElement.style.setProperty("--title-size", normalizeAxisValue(globalPng.title_size, false, "72px"));
      document.documentElement.style.setProperty("--title-weight", globalPng.title_weight || "700");
      document.documentElement.style.setProperty("--title-color", globalPng.title_color || "#d0a652");

      titleEl.textContent = safeText(globalPng.title_text || "MVP DO DIA");
      titleEl.style.display = toBool(globalPng.show_title, false) ? "flex" : "none";
      titleEl.style.justifyContent =
        safeText(globalPng.title_align || "center").toLowerCase() === "left" ? "flex-start" :
        safeText(globalPng.title_align || "center").toLowerCase() === "right" ? "flex-end" : "center";
      titleEl.style.textAlign = safeText(globalPng.title_align || "center").toLowerCase();

      const rowBg = safeText(globalPng.row_bg_image);
      document.documentElement.style.setProperty("--row-bg-image", rowBg && rowBg !== "0" ? `url("${toSrc(rowBg)}")` : "none");
      document.documentElement.style.setProperty("--row-bg-fit", globalPng.row_bg_fit || "cover");
      document.documentElement.style.setProperty("--row-bg-pos-x", globalPng.row_bg_pos_x || "center");
      document.documentElement.style.setProperty("--row-bg-pos-y", globalPng.row_bg_pos_y || "center");
      document.documentElement.style.setProperty("--row-bg-opacity", globalPng.row_bg_opacity || "1");

      const topArtPath = safeText(globalPng.top_art_image);
      if (topArtPath && topArtPath !== "0") {
        topArt.src = toSrc(topArtPath);
        topArt.style.display = "block";
      } else {
        topArt.removeAttribute("src");
        topArt.style.display = "none";
      }

      document.documentElement.style.setProperty("--top-art-x", normalizeAxisValue(globalPng.top_art_x, true, "0px"));
      document.documentElement.style.setProperty("--top-art-y", normalizeAxisValue(globalPng.top_art_y, true, "0px"));
      document.documentElement.style.setProperty("--top-art-w", normalizeAxisValue(globalPng.top_art_w, false, "0px"));
      document.documentElement.style.setProperty("--top-art-h", normalizeAxisValue(globalPng.top_art_h, false, "0px"));
      document.documentElement.style.setProperty("--top-art-fit", globalPng.top_art_fit || "contain");
      document.documentElement.style.setProperty("--top-art-opacity", globalPng.top_art_opacity || "0");

      const tableMode = safeText(globalPng.table_mode || "single").toLowerCase();
      board.classList.remove("mode-single", "mode-double");
      board.classList.add(tableMode === "double" ? "mode-double" : "mode-single");
      colRight.style.display = tableMode === "double" ? "" : "none";

      return {
        autoRefresh: toBool(globalPng.auto_refresh, true),
        tableMode,
        tableWidthPx: toNumber(globalPng.table_w, 1100),
        colGapPx: toNumber(globalPng.col_gap, 0),
        cellGapPx: toNumber(globalPng.cell_gap, 8)
      };
    }

    function collectRanges(columns){
      const set = new Set();
      for (const col of columns) {
        if (safeText(col.range).toLowerCase() !== "auto" && safeText(col.range)) {
          set.add(col.range.replace(/'/g, ""));
        }
      }
      return [...set];
    }

    function getMaxRows(columns, dataByRange){
      let max = 0;
      for (const col of columns) {
        const range = safeText(col.range).replace(/'/g, "");
        if (!range || range.toLowerCase() === "auto") continue;
        const rows = dataByRange[range] || [];
        if (rows.length > max) max = rows.length;
      }
      return max || 1;
    }

    function readRangeValue(range, dataByRange, rowIndex){
      const key = safeText(range).replace(/'/g, "");
      const rows = dataByRange[key] || [];
      const row = rows[rowIndex] || [];
      return row.map(v => safeText(v)).filter(Boolean).join(" ").trim();
    }

    function buildRows(columns, dataByRange, totalRows){
      const out = [];

      for (let i = 0; i < totalRows; i++) {
        const item = {};
        for (const col of columns) {
          let value = "";
          if (safeText(col.range).toLowerCase() === "auto") {
            value = String(i + 1).padStart(2, "0");
          } else {
            value = readRangeValue(col.range, dataByRange, i);
          }
          item[col.key] = { value, config: col };
        }
        out.push(item);
      }

      return out;
    }

    function splitRows(items, tableMode){
      if (tableMode === "single") {
        return { left: items, right: [] };
      }
      const half = Math.ceil(items.length / 2);
      return {
        left: items.slice(0, half),
        right: items.slice(half)
      };
    }

    function numPx(v, fallback = 0){
      const s = safeText(v);
      if (!s) return fallback;
      const n = toNumber(s, NaN);
      return Number.isFinite(n) ? n : fallback;
    }

    function fitCardLayout(columnsInOrder, availableWidth, defaultCellGap){
      const widths = columnsInOrder.map(c => {
        const raw = safeText(c.widthRaw).toLowerCase();
        if (!raw || raw === "auto") return 120;
        return Math.max(20, numPx(raw, 120));
      });

      const gaps = columnsInOrder.slice(0, -1).map(c => {
        const raw = safeText(c.gap_after);
        if (raw !== "") return Math.max(0, numPx(raw, defaultCellGap));
        return Math.max(0, defaultCellGap);
      });

      const totalWidths = widths.reduce((a,b) => a+b, 0);
      const totalGaps = gaps.reduce((a,b) => a+b, 0);
      const total = totalWidths + totalGaps;

      if (total <= availableWidth || availableWidth <= 0) {
        return { widths, gaps };
      }

      const scale = availableWidth / total;
      const scaledWidths = widths.map(v => Math.max(18, Math.floor(v * scale)));
      const scaledGaps = gaps.map(v => Math.max(0, Math.floor(v * scale)));

      return { widths: scaledWidths, gaps: scaledGaps };
    }

    function buildGridTemplate(widths, gaps){
      const parts = [];
      for (let i = 0; i < widths.length; i++) {
        parts.push(`${widths[i]}px`);
        if (i < gaps.length) parts.push(`${gaps[i]}px`);
      }
      return parts.join(" ");
    }

    function slotGridColumn(index){
      return String((index * 2) + 1);
    }

    function applySlotBox(slotEl, cfg, widthPx, visualIndex){
      slotEl.style.gridColumn = slotGridColumn(visualIndex);
      slotEl.style.width = `${widthPx}px`;
      slotEl.style.background = cfg.background || "transparent";
      slotEl.style.borderRadius = cfg.radius || "0px";
      slotEl.style.paddingLeft = cfg.padding || "0px";
      slotEl.style.paddingRight = cfg.padding || "0px";
      slotEl.style.justifyContent =
        cfg.align === "left" ? "flex-start" :
        cfg.align === "right" ? "flex-end" : "center";

      if (cfg.use_custom_height) {
        slotEl.style.height = parseMeasure(cfg.heightRaw, "100%");
        slotEl.style.alignSelf = "center";
      } else {
        slotEl.style.height = "100%";
        slotEl.style.alignSelf = "stretch";
      }
    }

    function createCard(row, refs, availableWidth, defaultCellGap){
      const rank = row[refs.rank.key] || { value:"", config: refs.rank };
      const logo = row[refs.logo.key] || { value:"", config: refs.logo };
      const name = row[refs.name.key] || { value:"", config: refs.name };
      const kill = row[refs.kill.key] || { value:"", config: refs.kill };

      const ordered = [rank.config, logo.config, name.config, kill.config];
      const fitted = fitCardLayout(ordered, availableWidth, defaultCellGap);

      const card = document.createElement("div");
      card.className = "card";
      card.style.gridTemplateColumns = buildGridTemplate(fitted.widths, fitted.gaps);

      const bg = document.createElement("div");
      bg.className = "card-bg";
      card.appendChild(bg);

      const rankEl = document.createElement("div");
      rankEl.className = "slot slot-rank";
      applySlotBox(rankEl, rank.config, fitted.widths[0], 0);
      rankEl.textContent = safeText(rank.value || "");
      rankEl.style.color = rank.config.text_color;
      rankEl.style.fontFamily = rank.config.font;
      rankEl.style.fontSize = rank.config.font_size;
      rankEl.style.fontWeight = rank.config.font_weight;

      const logoEl = document.createElement("div");
      logoEl.className = "slot slot-logo";
      applySlotBox(logoEl, logo.config, fitted.widths[1], 1);

      const img = document.createElement("img");
      const logoSrc = toSrc(logo.value);
      img.alt = "Logo equipe";
      img.style.objectFit = logo.config.image_fit;
      img.style.objectPosition = `${logo.config.image_align_x} ${logo.config.image_align_y}`;
      img.style.opacity = logo.config.image_opacity;

      if (logoSrc) {
        img.src = logoSrc;
        img.onerror = () => { img.style.display = "none"; };
      } else {
        img.style.display = "none";
      }
      logoEl.appendChild(img);

      const nameEl = document.createElement("div");
      nameEl.className = "slot slot-name";
      applySlotBox(nameEl, name.config, fitted.widths[2], 2);

      const nameTxt = document.createElement("div");
      nameTxt.className = "name-txt";
      nameTxt.textContent = safeText(name.value || "");
      nameTxt.style.color = name.config.text_color;
      nameTxt.style.fontFamily = name.config.font;
      nameTxt.style.fontSize = name.config.font_size;
      nameTxt.style.fontWeight = name.config.font_weight;
      nameTxt.style.textAlign = name.config.align;
      nameEl.appendChild(nameTxt);

      const killEl = document.createElement("div");
      killEl.className = "slot slot-kill";
      applySlotBox(killEl, kill.config, fitted.widths[3], 3);

      const killLabel = document.createElement("div");
      killLabel.className = "kill-label";
      killLabel.textContent = safeText(kill.config.header_text || "ABT");
      killLabel.style.color = kill.config.header_color || "#e0b14d";
      killLabel.style.fontFamily = kill.config.header_font || resolveFont("cutmark");
      killLabel.style.fontSize = kill.config.header_size || "20px";
      killLabel.style.fontWeight = kill.config.header_weight || "700";
      killLabel.style.textAlign = kill.config.header_align || "center";

      const killValue = document.createElement("div");
      killValue.className = "kill-value";
      killValue.textContent = safeText(kill.value || "0");
      killValue.style.color = kill.config.text_color;
      killValue.style.fontFamily = kill.config.font;
      killValue.style.fontSize = kill.config.font_size;
      killValue.style.fontWeight = kill.config.font_weight;

      killEl.appendChild(killLabel);
      killEl.appendChild(killValue);

      card.appendChild(rankEl);
      card.appendChild(logoEl);
      card.appendChild(nameEl);
      card.appendChild(killEl);

      return card;
    }

    function renderColumn(target, rows, refs, availableWidth, defaultCellGap){
      target.innerHTML = "";
      for (const row of rows) {
        target.appendChild(createCard(row, refs, availableWidth, defaultCellGap));
      }
    }

    function showDebug(text){
      debugEl.style.display = "block";
      debugEl.textContent = text;
    }

    function hideDebug(){
      debugEl.style.display = "none";
      debugEl.textContent = "";
    }

    async function tick(){
      try{
        if (!API_KEY || !SHEET_ID) {
          throw new Error("API_KEY ou SHEET_ID não definidos no overlay_config.js");
        }

        const cfgJson = await fetchSheetRange(CONFIG_RANGE);
        const parsed = parseConfigMatrix(cfgJson.values || []);
        const visibleColumns = buildVisibleColumns(parsed);

        if (!visibleColumns.length) {
          throw new Error("Nenhuma coluna visível encontrada na CONFIG (show = 1).");
        }

        const refs = {
          rank: findColumn(visibleColumns, ["RANK","RK","POS","POSICAO"]),
          logo: findColumn(visibleColumns, ["LOGOS","LOGO","LOGO_EQUIPE","EQUIPE_LOGO"]),
          name: findColumn(visibleColumns, ["NOME","NICK","NICK_DO_PLAYER","PLAYER","JOGADOR"]),
          kill: findColumn(visibleColumns, ["KILL","ABATES","ABT","ELIMS"])
        };

        if (!refs.rank) throw new Error("Coluna RANK não encontrada na CONFIG.");
        if (!refs.logo) throw new Error("Coluna LOGO não encontrada na CONFIG.");
        if (!refs.name) throw new Error("Coluna NOME/NICK não encontrada na CONFIG.");
        if (!refs.kill) throw new Error("Coluna ABATES/KILL não encontrada na CONFIG.");

        const globalState = applyGlobalPng(parsed.globalPng);

        const ranges = collectRanges(visibleColumns);
        const dataByRange = await fetchSheetRanges(ranges);

        const totalRows = getMaxRows(visibleColumns, dataByRange);
        const rowData = buildRows(visibleColumns, dataByRange, totalRows);
        const blocks = splitRows(rowData, globalState.tableMode);

        const availablePerBlock =
          globalState.tableMode === "single"
            ? globalState.tableWidthPx
            : Math.floor((globalState.tableWidthPx - globalState.colGapPx) / 2);

        renderColumn(colLeft, blocks.left, refs, availablePerBlock, globalState.cellGapPx);
        renderColumn(colRight, blocks.right, refs, availablePerBlock, globalState.cellGapPx);

        hideDebug();

        if (!globalState.autoRefresh && refreshTimer) {
          clearInterval(refreshTimer);
          refreshTimer = null;
        }
      } catch (err) {
        console.error(err);
        showDebug(
          "ERRO NA OVERLAY MVP PNG:\n\n" +
          (err?.message || String(err))
        );
      }
    }

    tick();

    if (!refreshTimer) {
      refreshTimer = setInterval(tick, REFRESH_MS);
    }
  </script>
</body>
</html>
